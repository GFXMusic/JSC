<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymnastics Team Selection Engine</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for single-file execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Custom Icon Component (since Lucide-React is tricky in plain HTML)
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const EVENTS = [
            { id: 'FX', name: 'Floor' },
            { id: 'PH', name: 'Pommel' },
            { id: 'SR', name: 'Rings' },
            { id: 'VT', name: 'Vault' },
            { id: 'PB', name: 'P-Bars' },
            { id: 'HB', name: 'H-Bar' },
        ];

        const BONUS_TABLE = {
            FX: [
                { d: 4.3, bonus: 0.102 },
                { d: 4.4, bonus: 0.163 },
                { d: 4.5, bonus: 0.231 },
                { d: 4.6, bonus: 0.308 },
                { d: 4.7, bonus: 0.393 },
                { d: 4.8, bonus: 0.488 },
                { d: 4.9, bonus: 0.594 },
                { d: 5.0, bonus: 0.711 },
                { d: 5.1, bonus: 0.841 },
                { d: 5.2, bonus: 0.984 },
                { d: 5.3, bonus: 1.143 },
                { d: 5.4, bonus: 1.318 },
                { d: 5.5, bonus: 1.511 },
            ],
            PH: [
                { d: 4.1, bonus: 0.102 },
                { d: 4.2, bonus: 0.163 },
                { d: 4.3, bonus: 0.231 },
                { d: 4.4, bonus: 0.308 },
                { d: 4.5, bonus: 0.393 },
                { d: 4.6, bonus: 0.488 },
                { d: 4.7, bonus: 0.594 },
                { d: 4.8, bonus: 0.711 },
                { d: 4.9, bonus: 0.841 },
                { d: 5.0, bonus: 0.984 },
                { d: 5.1, bonus: 1.143 },
                { d: 5.2, bonus: 1.318 },
                { d: 5.3, bonus: 1.511 }
            ],
            SR: [
                { d: 3.5, bonus: 0.102 },
                { d: 3.6, bonus: 0.163 },
                { d: 3.7, bonus: 0.231 },
                { d: 3.8, bonus: 0.308 },
                { d: 3.9, bonus: 0.393 },
                { d: 4.0, bonus: 0.488 },
                { d: 4.1, bonus: 0.594 },
                { d: 4.2, bonus: 0.711 },
                { d: 4.3, bonus: 0.841 },
                { d: 4.4, bonus: 0.984 },
                { d: 4.5, bonus: 1.143 },
                { d: 4.6, bonus: 1.318 },
                { d: 4.7, bonus: 1.511 },
            ],
            VT: [
                { d: 4.4, bonus: 0.102 },
                { d: 4.8, bonus: 0.531 },
                { d: 5.2, bonus: 1.002 },
                { d: 5.6, bonus: 1.516 },
            ],
            PB: [
                { d: 3.9, bonus: 0.102 },
                { d: 4.0, bonus: 0.163 },
                { d: 4.1, bonus: 0.231 },
                { d: 4.2, bonus: 0.308 },
                { d: 4.3, bonus: 0.393 },
                { d: 4.4, bonus: 0.488 },
                { d: 4.5, bonus: 0.594 },
                { d: 4.6, bonus: 0.711 },
                { d: 4.7, bonus: 0.841 },
                { d: 4.8, bonus: 0.984 },
                { d: 4.9, bonus: 1.143 },
                { d: 5.0, bonus: 1.318 },
                { d: 5.1, bonus: 1.511 },
            ],
            HB: [
                { d: 3.9, bonus: 0.102 },
                { d: 4.0, bonus: 0.163 },
                { d: 4.1, bonus: 0.231 },
                { d: 4.2, bonus: 0.308 },
                { d: 4.3, bonus: 0.393 },
                { d: 4.4, bonus: 0.488 },
                { d: 4.5, bonus: 0.594 },
                { d: 4.6, bonus: 0.711 },
                { d: 4.7, bonus: 0.841 },
                { d: 4.8, bonus: 0.984 },
                { d: 4.9, bonus: 1.143 },
                { d: 5.0, bonus: 1.318 },
                { d: 5.1, bonus: 1.511 },
            ],
        };

        const getEventBonus = (eventId, dValue) => {
            const dNum = parseFloat(dValue);
            if (Number.isNaN(dNum)) return '';
            const table = BONUS_TABLE[eventId] || [];
            if (table.length === 0) return '';
            let selected = 0;
            for (const row of table) {
                if (dNum >= row.d) selected = row.bonus;
            }
            return selected;
        };

        const App = () => {
            const [teamSize, setTeamSize] = useState(5);
            const [numUp, setNumUp] = useState(4);
            const [numCount, setNumCount] = useState(3);
            const [isCalculating, setIsCalculating] = useState(false);
            const [topTeams, setTopTeams] = useState([]);
            const [poolSort, setPoolSort] = useState('d');
            
            const [athletes, setAthletes] = useState(() => {
                const defaultNames = [
                    'Peyton Boerner', 'Hayden Brown', 'Lincoln Dubin', 'Hunter Egan',
                    'Cooper Gunderson', 'Elijah Gutierrez', 'Kiefer Hong', 'Jovan Jimeno',
                    'Maksim Kan', 'Jackson Kurecki', 'Ori Reilly', 'Anthony Ruscheinsky',
                    'Hunter Simpson', 'Jay Watkins',
                    'Andreas Aranda', 'Dominick Camarena', 'Jason Hao', 'Daniel Martin',
                    'Bo McCrea', 'Nixon Miles', 'Silas Reive', 'Cal Sanchez'
                ];
                return defaultNames.map((name, i) => ({
                    id: i,
                    name,
                    locked: false,
                    active: true,
                    scores: EVENTS.reduce((acc, event) => ({
                        ...acc,
                        [event.id]: { d: '', e: '', nd: '' }
                    }), {}),
                    bonuses: EVENTS.reduce((acc, event) => ({
                        ...acc,
                        [event.id]: { d: '', e: '', stick: false }
                    }), {})
                }));
            });

            useEffect(() => {
                if (typeof window !== 'undefined' && window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            }, [athletes, topTeams]);

            useEffect(() => {
                const saved = localStorage.getItem('gymAthletes');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) setAthletes(parsed);
                    } catch (error) {
                        console.warn('Invalid gymAthletes data in localStorage', error);
                    }
                }
            }, []);

            useEffect(() => {
                if (numUp > teamSize) setNumUp(teamSize);
                if (numCount > numUp) setNumCount(numUp);
            }, [teamSize, numUp, numCount]);

            const handleScoreChange = (athleteId, eventId, type, value) => {
                setAthletes(prev => prev.map(a => {
                    if (a.id !== athleteId) return a;
                    const nextScores = { ...a.scores, [eventId]: { ...a.scores[eventId], [type]: value } };
                    const nextBonuses = { ...a.bonuses };

                    if (type === 'd') {
                        nextBonuses[eventId] = {
                            ...nextBonuses[eventId],
                            d: getEventBonus(eventId, value)
                        };
                    }

                    return { ...a, scores: nextScores, bonuses: nextBonuses };
                }));
            };

            const handleBonusChange = (athleteId, eventId, type, value) => {
                setAthletes(prev => prev.map(a => 
                    a.id === athleteId 
                        ? { ...a, bonuses: { ...a.bonuses, [eventId]: { ...a.bonuses[eventId], [type]: value } } }
                        : a
                ));
            };

            const handlePoolToggle = (id) => {
                setAthletes(prev => prev.map(a => a.id === id ? { ...a, active: !a.active } : a));
            };

            const handleStickToggle = (athleteId, eventId) => {
                setAthletes(prev => prev.map(a => {
                    if (a.id !== athleteId) return a;
                    return {
                        ...a,
                        bonuses: {
                            ...a.bonuses,
                            [eventId]: {
                                ...a.bonuses[eventId],
                                stick: !a.bonuses[eventId].stick
                            }
                        }
                    };
                }));
            };

            const toggleLock = (id) => {
                const lockedCount = athletes.filter(a => a.locked).length;
                setAthletes(prev => prev.map(a => {
                    if (a.id === id) {
                        if (!a.locked && lockedCount >= teamSize) return a;
                        return { ...a, locked: !a.locked };
                    }
                    return a;
                }));
            };

            const parseScore = (value) => {
                const n = parseFloat(value);
                return Number.isNaN(n) ? 0 : n;
            };

            const calculateAANoBonus = (athlete) => {
                let totalD = 0;
                let totalFinal = 0;
                EVENTS.forEach(ev => {
                    const d = parseScore(athlete.scores[ev.id].d);
                    const e = parseScore(athlete.scores[ev.id].e);
                    const nd = parseScore(athlete.scores[ev.id].nd);
                    totalD += d;
                    totalFinal += (d + e - nd);
                });
                return { d: totalD.toFixed(3), total: totalFinal.toFixed(3) };
            };

            const calculateAAWithBonus = (athlete) => {
                let totalD = 0;
                let totalFinal = 0;
                EVENTS.forEach(ev => {
                    const d = parseScore(athlete.scores[ev.id].d);
                    const e = parseScore(athlete.scores[ev.id].e);
                    const nd = parseScore(athlete.scores[ev.id].nd);
                    const bd = parseScore(athlete.bonuses ? athlete.bonuses[ev.id].d : 0);
                    const stick = athlete.bonuses && athlete.bonuses[ev.id] && athlete.bonuses[ev.id].stick ? 0.1 : 0;
                    totalD += (d + bd);
                    totalFinal += (d + e - nd + bd + stick);
                });
                return { d: totalD.toFixed(3), total: totalFinal.toFixed(3) };
            };

            const sortedAthletes = useMemo(() => {
                const list = [...athletes];
                list.sort((a, b) => {
                    if (a.active !== b.active) return a.active ? -1 : 1;
                    if (poolSort === 'd') {
                        const aD = parseFloat(calculateAANoBonus(a).d);
                        const bD = parseFloat(calculateAANoBonus(b).d);
                        return bD - aD;
                    }
                    const aAA = parseFloat(calculateAANoBonus(a).total);
                    const bAA = parseFloat(calculateAANoBonus(b).total);
                    return bAA - aAA;
                });
                return list;
            }, [athletes, poolSort]);

            const saveAthletes = () => {
                try {
                    localStorage.setItem('gymAthletes', JSON.stringify(athletes));
                    alert('Athlete scores saved locally.');
                } catch (error) {
                    console.error(error);
                    alert('Failed to save scores.');
                }
            };

            const clearScores = () => {
                setAthletes(prev => prev.map(a => ({
                    ...a,
                    scores: EVENTS.reduce((acc, ev) => ({ ...acc, [ev.id]: { d: '', e: '', nd: '' } }), {}),
                    bonuses: EVENTS.reduce((acc, ev) => ({ ...acc, [ev.id]: { d: '', e: '', stick: false } }), {})
                })));
                alert('Scores and bonuses cleared.');
            };

            const solveTopTeams = () => {
                setIsCalculating(true);
                setTimeout(() => {
                    const results = [];
                    const lockedAthletes = athletes.filter(a => a.active && a.locked);
                    const remainingAthletes = athletes.filter(a => a.active && !a.locked);
                    const spotsToFill = teamSize - lockedAthletes.length;

                    function getCombinations(array, size) {
                        if (size === 0) return [[]];
                        const result = [];
                        function fork(i, combo) {
                            if (combo.length === size) {
                                result.push(combo);
                                return;
                            }
                            if (i === array.length) return;
                            fork(i + 1, [...combo, array[i]]);
                            fork(i + 1, combo);
                        }
                        fork(0, []);
                        return result;
                    }

                    const searchPool = spotsToFill > 5 
                        ? remainingAthletes.sort((a, b) => parseFloat(calculateAANoBonus(b).total) - parseFloat(calculateAANoBonus(a).total)).slice(0, 12)
                        : remainingAthletes;

                    const combos = getCombinations(searchPool, spotsToFill);

                    combos.forEach(combination => {
                        const team = [...lockedAthletes, ...combination];
                        let teamTotal = 0;
                        let teamTotalWithBonus = 0;
                        const eventBreakdown = {};

                        EVENTS.forEach(ev => {
                            const eventScores = team.map(a => {
                                const dBase = parseScore(a.scores[ev.id].d);
                                const eBase = parseScore(a.scores[ev.id].e);
                                const ndBase = parseScore(a.scores[ev.id].nd);
                                const dBonus = parseScore(a.bonuses ? a.bonuses[ev.id].d : 0);
                                const stickBonus = a.bonuses && a.bonuses[ev.id] && a.bonuses[ev.id].stick ? 0.1 : 0;
                                const noBonusTotal = dBase + eBase - ndBase;
                                const withBonusTotal = noBonusTotal + dBonus + stickBonus;
                                return {
                                    name: a.name,
                                    noBonusTotal,
                                    withBonusTotal,
                                    d: dBase,
                                    e: eBase,
                                    nd: ndBase,
                                    bd: dBonus,
                                    stick: stickBonus
                                };
                            })
                            .sort((a, b) => b.noBonusTotal - a.noBonusTotal)
                            .slice(0, numUp);

                            const counting = [...eventScores]
                                .sort((a, b) => b.noBonusTotal - a.noBonusTotal)
                                .slice(0, numCount);
                            
                            const eventSum = counting.reduce((sum, s) => sum + s.noBonusTotal, 0);
                            const eventSumWithBonus = counting.reduce((sum, s) => sum + s.withBonusTotal, 0);
                            teamTotal += eventSum;
                            teamTotalWithBonus += eventSumWithBonus;
                            eventBreakdown[ev.id] = {
                                allShow: eventScores,
                                countingNames: counting.map(c => c.name)
                            };
                        });
                        results.push({ team, total: teamTotal, totalWithBonus: teamTotalWithBonus, breakdown: eventBreakdown });
                    });

                    results.sort((a, b) => b.total - a.total);
                    setTopTeams(results.slice(0, 10));
                    setIsCalculating(false);
                }, 100);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-[1600px] mx-auto">
                        <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-800 tracking-tight">Junior International Selection Engine</h1>
                                <p className="text-slate-500">MAG Team Scoring Optimization</p>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <button 
                                    onClick={solveTopTeams}
                                    disabled={isCalculating}
                                    className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg flex items-center gap-2 disabled:opacity-50"
                                >
                                    {isCalculating ? "Calculating..." : "Optimize Team"}
                                </button>
                                <button onClick={saveAthletes} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg">Save Scores</button>
                                <button onClick={clearScores} className="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg">Clear Scores</button>
                            </div>
                        </header>

                        <div className="flex flex-col gap-8">
                            <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[{ l: 'Team Size', v: teamSize, s: setTeamSize, m: 10, d: 2 }, 
                                  { l: 'Number Up', v: numUp, s: setNumUp, m: 10, d: 1, max: teamSize },
                                  { l: 'Counting Scores', v: numCount, s: setNumCount, m: 10, d: 1, max: numUp }].map((item, i) => (
                                    <div key={i}>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">{item.l}</label>
                                        <select 
                                            value={item.v} 
                                            onChange={(e) => item.s(parseInt(e.target.value))}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 outline-none"
                                        >
                                            {Array.from({length: item.m}, (_, i) => i + 1).map(n => (
                                                <option key={n} value={n} disabled={n < item.d || (item.max && n > item.max)}>{n} {item.l.includes('Size') ? 'Athletes' : item.l.includes('Up') ? 'Up' : 'Count'}</option>
                                            ))}
                                        </select>
                                    </div>
                                ))}
                            </section>

                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 bg-white sticky left-0 font-bold text-lg">Athlete Pool & All-Around</div>
                                <div className="p-4 border-b border-slate-100 bg-slate-50 flex flex-wrap gap-3 items-center">
                                    <label className="text-sm">Sort by:</label>
                                    <select value={poolSort} onChange={(e) => setPoolSort(e.target.value)} className="bg-white border border-slate-200 rounded px-2 py-1 text-sm">
                                        <option value="d">Highest Total D-Score</option>
                                        <option value="aa">Highest AA</option>
                                    </select>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse min-w-[950px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-500 border-b">
                                                <th className="p-4 sticky left-0 bg-slate-50 z-10 w-56 shadow-[1px_0_0_0_#e2e8f0]">Athlete Name</th>
                                                {EVENTS.map(ev => <th key={ev.id} className="p-4 border-l text-center" colSpan="3">{ev.name}</th>)}
                                                <th className="p-4 border-l bg-blue-50/50 text-center" colSpan="2">All-Around</th>
                                            </tr>
                                            <tr className="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-500 border-b">
                                                <th className="p-4 sticky left-0 bg-slate-50 z-10 w-56 shadow-[1px_0_0_0_#e2e8f0]">&nbsp;</th>
                                                {EVENTS.map(ev => (
                                                    <>
                                                        <th key={`${ev.id}-d`} className="p-2 border-l text-center w-16" title="2026 Expotential Bonus Added Automatically">D</th>
                                                        <th key={`${ev.id}-e`} className="p-2 text-center w-16">E</th>
                                                        <th key={`${ev.id}-nd`} className="p-2 text-center w-16">ND</th>
                                                    </>
                                                ))}
                                                <th className="p-2 border-l bg-blue-50/50 text-center">Total D-Score</th>
                                                <th className="p-2 bg-blue-50/50 text-center">AA</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sortedAthletes.map(athlete => {
                                                const aaNoBonus = calculateAANoBonus(athlete);
                                                const aaWithBonus = calculateAAWithBonus(athlete);
                                                return (
                                                    <React.Fragment key={athlete.id}>
                                                        <tr className={`${athlete.locked ? 'bg-orange-50/40' : 'hover:bg-blue-50/30'} border-b border-slate-100`}>
                                                            <td className={`px-2 py-1 sticky left-0 z-10 flex flex-col gap-0.5 ${athlete.locked ? 'bg-orange-50' : athlete.active ? 'bg-white' : 'bg-slate-100'} shadow-[1px_0_0_0_#e2e8f0]`}>
                                                                <input type="text" value={athlete.name} onChange={(e) => setAthletes(prev => prev.map(a => a.id === athlete.id ? {...a, name: e.target.value} : a))} className="bg-transparent font-semibold text-sm w-full outline-none py-0" />
                                                                <div className="flex items-center gap-1 text-xs">
                                                                    <button onClick={() => toggleLock(athlete.id)} className={`p-1 rounded ${athlete.locked ? 'text-orange-600 bg-orange-100' : 'text-slate-300'}`}>
                                                                        <Icon name={athlete.locked ? 'lock' : 'unlock'} size={14} />
                                                                    </button>
                                                                    <label className="flex items-center gap-1 text-xxs">
                                                                        <input type="checkbox" className="h-3 w-3" checked={athlete.active} onChange={() => handlePoolToggle(athlete.id)} />
                                                                        <span>{athlete.active ? 'In Pool' : 'Excluded'}</span>
                                                                    </label>
                                                                </div>
                                                            </td>
                                                            {EVENTS.map(ev => (
                                                                <React.Fragment key={ev.id}>
                                                                    <td className="px-1 py-0.5 border-l border-slate-200"><input type="number" step="0.1" value={athlete.scores[ev.id].d} onChange={(e) => handleScoreChange(athlete.id, ev.id, 'd', e.target.value)} disabled={!athlete.active} className="w-full text-center text-[11px] p-0.5 bg-slate-50/50 rounded border border-slate-200 outline-none" /></td>
                                                                    <td className="px-1 py-0.5"><input type="number" step="0.1" value={athlete.scores[ev.id].e} onChange={(e) => handleScoreChange(athlete.id, ev.id, 'e', e.target.value)} disabled={!athlete.active} className="w-full text-center text-[11px] p-0.5 bg-slate-50/50 rounded border border-slate-200 outline-none" /></td>
                                                                    <td className="px-1 py-0.5 border-r border-slate-200"><input type="number" step="0.1" value={athlete.scores[ev.id].nd} onChange={(e) => handleScoreChange(athlete.id, ev.id, 'nd', e.target.value)} disabled={!athlete.active} className="w-full text-center text-[11px] p-0.5 bg-slate-50/50 rounded border border-slate-200 outline-none" /></td>
                                                                </React.Fragment>
                                                            ))}
                                                            <td className="p-2 text-center font-semibold text-blue-700 bg-blue-50/30 border-l border-blue-100">{aaNoBonus.d}</td>
                                                            <td className="p-2 text-center font-bold text-blue-900 bg-blue-50/30">{aaNoBonus.total}</td>
                                                        </tr>
                                                        <tr className="bg-slate-100/70 border-b border-slate-100">
                                                            <td className="p-2 pl-4 sticky left-0 z-10 font-semibold text-slate-600 bg-slate-100 shadow-[1px_0_0_0_#e2e8f0]">Bonus</td>
                                                            {EVENTS.map(ev => (
                                                                <React.Fragment key={`bonus-${ev.id}`}>
                                                                    <td className="px-1 py-0.5 border-l border-slate-200" title="2026 Expotential Bonus Added Automatically"><input type="number" step="0.1" value={athlete.bonuses[ev.id].d} onChange={(e) => handleBonusChange(athlete.id, ev.id, 'd', e.target.value)} disabled={!athlete.active} className="w-full text-center text-[11px] p-0.5 bg-rose-50/50 rounded border border-rose-200 outline-none" /></td>
                                                                    <td className="px-1 py-0.5 border-l border-slate-200 text-center text-[11px]">
                                                                        <label className="flex items-center justify-center gap-1">
                                                                            <input type="checkbox" checked={!!athlete.bonuses[ev.id].stick} onChange={() => handleStickToggle(athlete.id, ev.id)} disabled={!athlete.active} className="h-4 w-4" />
                                                                            Stick
                                                                        </label>
                                                                    </td>
                                                                    <td className="px-1 py-0.5 border-r border-slate-200 text-center text-[11px] text-emerald-700">{athlete.bonuses[ev.id].stick ? '+0.10' : ''}</td>
                                                                </React.Fragment>
                                                            ))}
                                                            <td className="p-2 text-center font-semibold text-red-700 bg-red-50/30 border-l border-red-100">{aaWithBonus.d}</td>
                                                            <td className="p-2 text-center font-bold text-red-900 bg-red-50/30">{aaWithBonus.total}</td>
                                                        </tr>
                                                    </React.Fragment>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </section>

                            {topTeams.length > 0 && (() => {
                                const topTeamsWithBonus = [...topTeams].sort((a, b) => b.totalWithBonus - a.totalWithBonus);
                                const renderTeamBox = (teamData, rank, type) => {
                                    const isNoBonus = type === 'no';
                                    const teamScore = isNoBonus ? teamData.total : teamData.totalWithBonus;
                                    const scoreKey = isNoBonus ? 'noBonusTotal' : 'withBonusTotal';
                                    return (
                                        <div key={`${type}-${rank}`} className="bg-white rounded-2xl shadow-md overflow-hidden border">
                                            <div className={`p-3 ${isNoBonus ? 'bg-blue-50' : 'bg-red-50'} border-b`}> 
                                                <div className="flex justify-between items-center gap-3">
                                                    <div>
                                                        <div className="text-xs font-bold uppercase tracking-widest">{isNoBonus ? `Rank ${rank} (No Bonus)` : `Rank ${rank} (With Bonus)`}</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-3 overflow-x-auto">
                                                <table className="w-full text-left text-xs border-collapse">
                                                    <thead>
                                                        <tr>
                                                            <th className="border p-1 bg-slate-100">Athlete</th>
                                                            {EVENTS.map(ev => <th key={ev.id} className="border p-1 bg-slate-100">{ev.id}</th>)}
                                                            <th className="border p-1 bg-slate-100">Total</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {teamData.team.map((athlete, ai) => {
                                                            const eventTotals = EVENTS.map(ev => {
                                                                const evd = teamData.breakdown[ev.id];
                                                                if (!evd) return { value: 0, used: false };
                                                                const ath = evd.allShow.find(s => s.name === athlete.name);
                                                                const used = evd.countingNames.includes(athlete.name);
                                                                return { value: ath ? ath[scoreKey] : 0, used };
                                                            });
                                                            const personTotal = eventTotals.reduce((sum, s) => sum + s.value, 0);
                                                            return (
                                                                <tr key={ai} className="border-t">
                                                                    <td className="border p-1 truncate max-w-[8rem]">{athlete.name}</td>
                                                                    {eventTotals.map((evt, i) => (
                                                                        <td key={i} className={`border p-1 text-right ${evt.used ? 'bg-yellow-100 font-semibold' : ''}`}>
                                                                            {evt.value ? evt.value.toFixed(2) : '-'}
                                                                        </td>
                                                                    ))}
                                                                    <td className="border p-1 text-right font-bold">{personTotal.toFixed(2)}</td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                    <tfoot>
                                                        <tr>
                                                            <td className="border p-1 font-semibold">Team Score</td>
                                                            {EVENTS.map(ev => {
                                                                const evd = teamData.breakdown[ev.id];
                                                                const coin = evd ? evd.countingNames.reduce((s, name) => {
                                                                    const a = evd.allShow.find(r => r.name === name);
                                                                    return s + (a ? a[scoreKey] : 0);
                                                                }, 0) : 0;
                                                                return <td key={ev.id} className="border p-1 text-right font-semibold">{coin.toFixed(2)}</td>;
                                                            })}
                                                            <td className="border p-1 text-right font-black">{teamScore.toFixed(3)}</td>
                                                        </tr>
                                                    </tfoot>
                                                </table>
                                            </div>
                                        </div>
                                    );
                                };

                                return (
                                    <section className="space-y-6 pb-20">
                                        <h2 className="text-2xl font-bold text-slate-800">Top 10 Team Scenarios</h2>
                                        <div className="grid gap-6 md:grid-cols-2">
                                            <div className="space-y-4">
                                                <h3 className="text-lg font-semibold text-blue-700">Best Without Bonus</h3>
                                                {topTeams.map((teamData, idx) => renderTeamBox(teamData, idx + 1, 'no'))}
                                            </div>
                                            <div className="space-y-4">
                                                <h3 className="text-lg font-semibold text-red-700">Best With Bonus</h3>
                                                {topTeamsWithBonus.map((teamData, idx) => renderTeamBox(teamData, idx + 1, 'with'))}
                                            </div>
                                        </div>
                                    </section>
                                );
                            })()}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
