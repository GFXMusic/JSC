<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymnastics Team Selection Engine</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for single-file execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Custom Icon Component (since Lucide-React is tricky in plain HTML)
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const EVENTS = [
            { id: 'FX', name: 'Floor' },
            { id: 'PH', name: 'Pommel' },
            { id: 'SR', name: 'Rings' },
            { id: 'VT', name: 'Vault' },
            { id: 'PB', name: 'P-Bars' },
            { id: 'HB', name: 'H-Bar' },
        ];

        const App = () => {
            const [teamSize, setTeamSize] = useState(5);
            const [numUp, setNumUp] = useState(4);
            const [numCount, setNumCount] = useState(3);
            const [isCalculating, setIsCalculating] = useState(false);
            const [topTeams, setTopTeams] = useState([]);
            
            const [athletes, setAthletes] = useState(() => 
                Array.from({ length: 20 }, (_, i) => ({
                    id: i,
                    name: `Athlete ${i + 1}`,
                    locked: false,
                    scores: EVENTS.reduce((acc, event) => ({
                        ...acc,
                        [event.id]: { d: 4.5 + (Math.random() * 1.5), e: 8.0 + (Math.random() * 1.5) }
                    }), {})
                }))
            );

            useEffect(() => { lucide.createIcons(); }, [athletes, topTeams]);

            useEffect(() => {
                if (numUp > teamSize) setNumUp(teamSize);
                if (numCount > numUp) setNumCount(numUp);
            }, [teamSize, numUp, numCount]);

            const handleScoreChange = (athleteId, eventId, type, value) => {
                const val = parseFloat(value) || 0;
                setAthletes(prev => prev.map(a => 
                    a.id === athleteId 
                        ? { ...a, scores: { ...a.scores, [eventId]: { ...a.scores[eventId], [type]: val } } }
                        : a
                ));
            };

            const toggleLock = (id) => {
                const lockedCount = athletes.filter(a => a.locked).length;
                setAthletes(prev => prev.map(a => {
                    if (a.id === id) {
                        if (!a.locked && lockedCount >= teamSize) return a;
                        return { ...a, locked: !a.locked };
                    }
                    return a;
                }));
            };

            const calculateAA = (athlete) => {
                let totalD = 0;
                let totalFinal = 0;
                EVENTS.forEach(ev => {
                    const d = athlete.scores[ev.id].d;
                    const e = athlete.scores[ev.id].e;
                    totalD += d;
                    totalFinal += (d + e);
                });
                return { d: totalD.toFixed(3), total: totalFinal.toFixed(3) };
            };

            const solveTopTeams = () => {
                setIsCalculating(true);
                setTimeout(() => {
                    const results = [];
                    const lockedAthletes = athletes.filter(a => a.locked);
                    const remainingAthletes = athletes.filter(a => !a.locked);
                    const spotsToFill = teamSize - lockedAthletes.length;

                    function getCombinations(array, size) {
                        if (size === 0) return [[]];
                        const result = [];
                        function fork(i, combo) {
                            if (combo.length === size) {
                                result.push(combo);
                                return;
                            }
                            if (i === array.length) return;
                            fork(i + 1, [...combo, array[i]]);
                            fork(i + 1, combo);
                        }
                        fork(0, []);
                        return result;
                    }

                    const searchPool = spotsToFill > 5 
                        ? remainingAthletes.sort((a, b) => parseFloat(calculateAA(b).total) - parseFloat(calculateAA(a).total)).slice(0, 12)
                        : remainingAthletes;

                    const combos = getCombinations(searchPool, spotsToFill);

                    combos.forEach(combination => {
                        const team = [...lockedAthletes, ...combination];
                        let teamTotal = 0;
                        const eventBreakdown = {};

                        EVENTS.forEach(ev => {
                            const eventScores = team.map(a => ({
                                name: a.name,
                                total: a.scores[ev.id].d + a.scores[ev.id].e,
                                d: a.scores[ev.id].d,
                                e: a.scores[ev.id].e
                            }))
                            .sort((a, b) => b.total - a.total)
                            .slice(0, numUp);

                            const counting = [...eventScores]
                                .sort((a, b) => b.total - a.total)
                                .slice(0, numCount);
                            
                            const eventSum = counting.reduce((sum, s) => sum + s.total, 0);
                            teamTotal += eventSum;
                            eventBreakdown[ev.id] = {
                                allShow: eventScores,
                                countingNames: counting.map(c => c.name)
                            };
                        });
                        results.push({ team, total: teamTotal, breakdown: eventBreakdown });
                    });

                    results.sort((a, b) => b.total - a.total);
                    setTopTeams(results.slice(0, 10));
                    setIsCalculating(false);
                }, 100);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-[1600px] mx-auto">
                        <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-800 tracking-tight">Junior International Selection Engine</h1>
                                <p className="text-slate-500">MAG Team Scoring Optimization</p>
                            </div>
                            <button 
                                onClick={solveTopTeams}
                                disabled={isCalculating}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 disabled:opacity-50"
                            >
                                {isCalculating ? "Calculating..." : "Optimize Team"}
                            </button>
                        </header>

                        <div className="flex flex-col gap-8">
                            <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[{ l: 'Team Size', v: teamSize, s: setTeamSize, m: 10, d: 2 }, 
                                  { l: 'Number Up', v: numUp, s: setNumUp, m: 10, d: 1, max: teamSize },
                                  { l: 'Counting Scores', v: numCount, s: setNumCount, m: 10, d: 1, max: numUp }].map((item, i) => (
                                    <div key={i}>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">{item.l}</label>
                                        <select 
                                            value={item.v} 
                                            onChange={(e) => item.s(parseInt(e.target.value))}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 outline-none"
                                        >
                                            {Array.from({length: item.m}, (_, i) => i + 1).map(n => (
                                                <option key={n} value={n} disabled={n < item.d || (item.max && n > item.max)}>{n} {item.l.includes('Size') ? 'Athletes' : item.l.includes('Up') ? 'Up' : 'Count'}</option>
                                            ))}
                                        </select>
                                    </div>
                                ))}
                            </section>

                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 bg-white sticky left-0 font-bold text-lg">Athlete Pool & All-Around</div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse min-w-[1200px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-500 border-b">
                                                <th className="p-4 sticky left-0 bg-slate-50 z-10 w-56 shadow-[1px_0_0_0_#e2e8f0]">Athlete Name</th>
                                                {EVENTS.map(ev => <th key={ev.id} className="p-4 border-l text-center" colSpan="2">{ev.name}</th>)}
                                                <th className="p-4 border-l bg-blue-50/50 text-center" colSpan="2">All-Around</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {athletes.map(athlete => {
                                                const aa = calculateAA(athlete);
                                                return (
                                                    <tr key={athlete.id} className={`${athlete.locked ? 'bg-orange-50/40' : 'hover:bg-blue-50/30'} border-b border-slate-100`}>
                                                        <td className={`p-2 pl-4 sticky left-0 z-10 flex items-center gap-2 ${athlete.locked ? 'bg-orange-50' : 'bg-white'} shadow-[1px_0_0_0_#e2e8f0]`}>
                                                            <button onClick={() => toggleLock(athlete.id)} className={`p-1.5 rounded ${athlete.locked ? 'text-orange-600 bg-orange-100' : 'text-slate-300'}`}>
                                                                <Icon name={athlete.locked ? 'lock' : 'unlock'} size={14} />
                                                            </button>
                                                            <input type="text" value={athlete.name} onChange={(e) => setAthletes(prev => prev.map(a => a.id === athlete.id ? {...a, name: e.target.value} : a))} className="bg-transparent font-medium text-sm w-full outline-none" />
                                                        </td>
                                                        {EVENTS.map(ev => (
                                                            <React.Fragment key={ev.id}>
                                                                <td className="p-1 border-l border-slate-50"><input type="number" step="0.1" value={athlete.scores[ev.id].d} onChange={(e) => handleScoreChange(athlete.id, ev.id, 'd', e.target.value)} className="w-full text-center text-xs p-1 bg-slate-50/50 rounded border border-slate-200 outline-none" /></td>
                                                                <td className="p-1"><input type="number" step="0.1" value={athlete.scores[ev.id].e} onChange={(e) => handleScoreChange(athlete.id, ev.id, 'e', e.target.value)} className="w-full text-center text-xs p-1 bg-slate-50/50 rounded border border-slate-200 outline-none" /></td>
                                                            </React.Fragment>
                                                        ))}
                                                        <td className="p-2 text-center font-semibold text-blue-700 bg-blue-50/30 border-l border-blue-100">{aa.d}</td>
                                                        <td className="p-2 text-center font-bold text-blue-900 bg-blue-50/30">{aa.total}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </section>

                            {topTeams.length > 0 && (
                                <section className="space-y-6 pb-20">
                                    <h2 className="text-2xl font-bold text-slate-800">Top 10 Team Scenarios</h2>
                                    {topTeams.map((teamData, idx) => (
                                        <div key={idx} className="bg-white rounded-2xl shadow-md border-l-4 border-l-blue-500 overflow-hidden">
                                            <div className="bg-slate-800 p-4 flex justify-between items-center text-white">
                                                <div className="flex gap-4 items-center">
                                                    <span className="bg-blue-600 px-2 py-1 rounded text-xs font-black">RANK {idx + 1}</span>
                                                    <div className="flex gap-2">{teamData.team.map(a => <span key={a.id} className="text-[10px] bg-slate-700 px-2 rounded">{a.name}</span>)}</div>
                                                </div>
                                                <div className="text-2xl font-black text-yellow-400">{teamData.total.toFixed(3)}</div>
                                            </div>
                                            <div className="p-4 bg-slate-50/50 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                                                {EVENTS.map(ev => {
                                                    const ed = teamData.breakdown[ev.id];
                                                    const et = ed.allShow.filter(s => ed.countingNames.includes(s.name)).reduce((sum, s) => sum + s.total, 0);
                                                    return (
                                                        <div key={ev.id} className="bg-white p-3 rounded-xl border border-slate-200">
                                                            <div className="text-[10px] font-bold border-b pb-1 flex justify-between"><span>{ev.name}</span><span className="text-blue-600">{et.toFixed(2)}</span></div>
                                                            <div className="mt-1 space-y-1">{ed.allShow.map((s, i) => (
                                                                <div key={i} className={`flex justify-between text-[11px] px-1 rounded ${ed.countingNames.includes(s.name) ? 'bg-yellow-100 font-bold border-l-2 border-yellow-500' : 'text-slate-400'}`}>
                                                                    <span className="truncate">{s.name}</span><span>{s.total.toFixed(2)}</span>
                                                                </div>
                                                            ))}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </section>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
